name = "a2a-relay"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Durable Objects 配置
[[durable_objects.bindings]]
name = "CONNECTION_MANAGER"
class_name = "ConnectionManager"
script_name = "a2a-relay"

# 遷移配置（免費計劃需要用 new_sqlite_classes）
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ConnectionManager"]

[env.production]
name = "a2a-relay"

# Firebase 配置
[env.production.vars]
FIREBASE_PROJECT_ID = "a2a-network"

# Durable Objects 配置（生產環境）
[[env.production.durable_objects.bindings]]
name = "CONNECTION_MANAGER"
class_name = "ConnectionManager"
script_name = "a2a-relay"
